
worker_processes auto;
events { worker_connections 1024; }

http {
    # Rate limit zone: 5 requests/min per IP on /api/
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/m;

    upstream api_backend  { server api:8000; }
    upstream ui_frontend  { server ui:8501;  }

    server {
        listen 80;
        server_name _;

        # API traffic
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Prometheus metrics (no rate limit)
        location /metrics {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Streamlit UI (WebSocket required for live updates)
        location / {
            proxy_pass             http://ui_frontend;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_read_timeout     86400;
        }
    }
}
