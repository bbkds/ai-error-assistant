# Two isolated networks:
#   frontend_net: Nginx ↔ UI ↔ API
#   backend_net:  API ↔ Redis ↔ Celery ↔ Postgres
# UI and Nginx have NO direct access to Redis or Postgres.
networks:
  frontend_net:
  backend_net:

volumes:
  postgres_data:
  redis_data:
  model_data:      # shared between api and worker; persists trained model
  prometheus_data:
  grafana_data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: [backend_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  # Startup order: wait for healthy postgres + redis,
  # then run Alembic migrations, then train model (if not cached), then serve.
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - model_data:/app/models
      - ./logs:/app/logs
    networks: [frontend_net, backend_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s   # allow time for migration + training
    stop_grace_period: 30s

  # ── Celery worker ──────────────────────────────────────────────────────────
  # Waits for the API to be healthy (so model is already trained on the volume)
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - model_data:/app/models
      - ./logs:/app/logs
    networks: [backend_net]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy  # model is ready on the volume by now
    stop_grace_period: 60s

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    networks: [frontend_net]
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    networks: [frontend_net]
    depends_on:
      - api
      - ui

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks: [backend_net, frontend_net]

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [frontend_net]
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
